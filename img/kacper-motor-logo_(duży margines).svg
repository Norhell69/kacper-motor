<svg width="600" height="250" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Kacper-Motor</title>
  <desc>Techniczne logo warsztatu Kacper-Motor z grafiką tłoka i przekładni</desc>

  <style>
    .bg-card { fill: #0a0a0a; }
    .corner  { stroke: #e8001c; fill: none; stroke-width: 1.5; opacity:.55; }
    .name-main { font-family: 'Rajdhani','Barlow Condensed',Arial Black,sans-serif; font-size: 40px; font-weight: 700; fill: #ffffff; letter-spacing: 2px; }
    .name-dash { fill: #e8001c; }
    .sub  { font-family: 'Barlow Condensed',Arial Narrow,sans-serif; font-size: 11px; fill: #777; letter-spacing: 6px; }
    .tag  { font-family: 'Barlow Condensed',Arial Narrow,sans-serif; font-size: 10px; fill: #e8001c; letter-spacing: 3px; }
  </style>

  <!-- card -->
  <rect x="40" y="25" width="600" height="250" rx="3" class="bg-card"/>
  <rect x="40" y="25" width="600" height="250" rx="3" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- corner brackets -->
  <polyline points="40,75 40,25 90,25"    class="corner"/>
  <polyline points="590,25 640,25 640,75" class="corner"/>
  <polyline points="40,225 40,275 90,275" class="corner"/>
  <polyline points="590,275 640,275 640,225" class="corner"/>

  <!-- === BIG GEAR === -->
  <g transform="translate(108,150)">
    <circle r="30" fill="#140000" stroke="#e8001c" stroke-width="1.2"/>
    <circle r="20" fill="none" stroke="#e8001c" stroke-width="0.6" opacity=".4"/>
    <circle r="8"  fill="#0a0a0a" stroke="#e8001c" stroke-width="1.2"/>
    <circle r="3"  fill="#e8001c"/>
    <g fill="#e8001c">
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(0)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(30)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(60)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(90)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(120)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(150)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(180)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(210)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(240)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(270)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(300)"/>
      <rect x="-4" y="-42" width="8" height="10" rx="1.5" transform="rotate(330)"/>
    </g>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(0)"/>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(60)"/>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(120)"/>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(180)"/>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(240)"/>
    <line x1="0" y1="-19" x2="0" y2="-8" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(300)"/>
  </g>

  <!-- === SMALL GEAR === -->
  <g transform="translate(155,107)">
    <circle r="20" fill="#140000" stroke="#e8001c" stroke-width="1.2"/>
    <circle r="13" fill="none" stroke="#e8001c" stroke-width="0.6" opacity=".4"/>
    <circle r="5"  fill="#0a0a0a" stroke="#e8001c" stroke-width="1.2"/>
    <circle r="2"  fill="#e8001c"/>
    <g fill="#e8001c">
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(0)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(45)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(90)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(135)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(180)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(225)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(270)"/>
      <rect x="-3" y="-27" width="6" height="8" rx="1.2" transform="rotate(315)"/>
    </g>
    <line x1="0" y1="-12" x2="0" y2="-5" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(0)"/>
    <line x1="0" y1="-12" x2="0" y2="-5" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(90)"/>
    <line x1="0" y1="-12" x2="0" y2="-5" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(180)"/>
    <line x1="0" y1="-12" x2="0" y2="-5" stroke="#e8001c" stroke-width="1" opacity=".5" transform="rotate(270)"/>
  </g>

  <!-- === PISTON === -->
  <rect x="83" y="55" width="50" height="62" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <line x1="86"  y1="55" x2="86"  y2="117" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="130" y1="55" x2="130" y2="117" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="85" y="72" width="46" height="22" rx="2" fill="#2a2a2a" stroke="#e8001c" stroke-width="1.2"/>
  <rect x="89" y="74" width="38" height="4"  rx="1" fill="#e8001c" opacity=".7"/>
  <rect x="85" y="82" width="46" height="3"  rx="0" fill="none" stroke="#e8001c" stroke-width="1" opacity=".6"/>
  <rect x="85" y="87" width="46" height="3"  rx="0" fill="none" stroke="#e8001c" stroke-width="1" opacity=".35"/>
  <line x1="95"  y1="94" x2="121" y2="94" stroke="#e8001c" stroke-width="1.5" opacity=".8" stroke-linecap="round"/>
  <circle cx="108" cy="94" r="3" fill="#e8001c" opacity=".9"/>
  <line x1="108" y1="94"  x2="108" y2="117" stroke="#e8001c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="117" x2="108" y2="150" stroke="#e8001c" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <line x1="90"  y1="65" x2="126" y2="65" stroke="#e8001c" stroke-width="0.8" opacity=".3" stroke-dasharray="3,3"/>
  <line x1="90"  y1="60" x2="126" y2="60" stroke="#e8001c" stroke-width="0.5" opacity=".15" stroke-dasharray="2,4"/>

  <!-- hex frame -->
  <polygon points="68,52 178,52 198,150 178,248 68,248 48,150" fill="none" stroke="#e8001c" stroke-width="1" opacity=".2"/>

  <!-- red accent vertical bar -->
  <rect x="212" y="88" width="3" height="82" fill="#e8001c"/>

  <!-- tag line -->
  <text x="226" y="112" class="tag">// SERWIS I NAPRAWA MOTOCYKLI</text>

  <!-- main name -->
  <text x="226" y="160" class="name-main">KACPER<tspan class="name-dash">-</tspan>MOTOR</text>

  <!-- sub label -->
  <text x="226" y="184" class="sub">WARSZTAT MOTOCYKLOWY · WARSZAWA</text>

  <!-- bottom accent lines -->
  <rect x="226" y="196" width="370" height="1" fill="#e8001c" opacity=".25"/>
  <rect x="226" y="199" width="60"  height="1" fill="#e8001c" opacity=".5"/>

  <!-- dot trail -->
  <circle cx="606" cy="197" r="2.5" fill="#e8001c" opacity=".7"/>
  <circle cx="616" cy="197" r="2.5" fill="#e8001c" opacity=".35"/>
  <circle cx="626" cy="197" r="2.5" fill="#e8001c" opacity=".15"/>

</svg>
